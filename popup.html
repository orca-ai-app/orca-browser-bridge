<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 340px;
      max-height: 580px;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1e;
      color: #e0e0e0;
      margin: 0;
      overflow-y: auto;
    }
    h3 {
      margin: 0 0 8px 0;
      font-size: 13px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .version {
      font-size: 10px;
      color: #444;
      font-weight: normal;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 11px;
      color: #666;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .connected { background: #4ade80; box-shadow: 0 0 6px #4ade8044; }
    .connecting { background: #facc15; animation: pulse 1.5s infinite; }
    .disconnected { background: #555; }
    @keyframes pulse { 50% { opacity: 0.4; } }

    /* Cards */
    .crm-card {
      padding: 12px 14px;
      border-radius: 10px;
      background: #161625;
      border: 1px solid #1e1e35;
      margin-bottom: 8px;
    }
    .crm-loading {
      text-align: center;
      color: #555;
      padding: 16px;
      font-size: 12px;
    }

    /* Contact header with avatar */
    .contact-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .contact-avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }
    .contact-header-info {
      flex: 1;
      min-width: 0;
    }
    .contact-name {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      line-height: 1.2;
    }
    .contact-meta {
      font-size: 11px;
      color: #8892a8;
      margin-top: 2px;
    }

    /* Badges */
    .contact-badges {
      margin-bottom: 8px;
    }
    .match-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 4px;
      margin-bottom: 4px;
    }
    .badge-known { background: rgba(74, 222, 128, 0.12); color: #4ade80; }
    .badge-new { background: rgba(251, 146, 60, 0.12); color: #fb923c; }
    .badge-company { background: rgba(59, 130, 246, 0.12); color: #3b82f6; }

    .stage-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding: 3px 8px;
      border-radius: 4px;
      background: #1e1e35;
      color: #8892a8;
    }
    .stage-badge.stage-known { background: rgba(74, 222, 128, 0.08); color: #4ade80; }
    .stage-badge.stage-warm { background: rgba(250, 204, 21, 0.08); color: #facc15; }
    .stage-badge.stage-active { background: rgba(59, 130, 246, 0.08); color: #3b82f6; }
    .stage-badge.stage-close { background: rgba(239, 68, 68, 0.08); color: #ef4444; }

    /* Warmth bar */
    .warmth-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }
    .warmth-label {
      font-size: 10px;
      color: #555;
      min-width: 44px;
    }
    .warmth-bar {
      flex: 1;
      height: 5px;
      background: #1e1e35;
      border-radius: 3px;
      overflow: hidden;
    }
    .warmth-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .warmth-fill.cold { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
    .warmth-fill.warm { background: linear-gradient(90deg, #eab308, #facc15); }
    .warmth-fill.hot { background: linear-gradient(90deg, #ea580c, #f97316); }
    .warmth-fill.fire { background: linear-gradient(90deg, #dc2626, #ef4444); }
    .warmth-score {
      font-size: 12px;
      font-weight: 700;
      min-width: 24px;
      text-align: right;
    }

    /* Email list */
    .email-list {
      margin-top: 10px;
      border-top: 1px solid #1e1e35;
      padding-top: 8px;
    }
    .email-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 11px;
    }
    .email-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #555;
      min-width: 42px;
    }
    .email-addr {
      color: #7ba4d4;
    }

    /* Section titles */
    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #4a5068;
      margin-bottom: 10px;
    }

    /* Fact rows */
    .fact-row {
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #12122040;
    }
    .fact-row:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    .fact-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #4a5068;
      margin-bottom: 2px;
    }
    .fact-text {
      font-size: 12px;
      color: #c8cfe0;
      line-height: 1.4;
    }

    /* Meeting briefs */
    .brief-item {
      padding: 8px 10px;
      background: #0f0f1e;
      border-radius: 6px;
      margin-bottom: 4px;
      border-left: 3px solid #2a2a48;
    }
    .brief-item:last-child { margin-bottom: 0; }
    .brief-title {
      font-size: 12px;
      color: #e2e8f0;
      font-weight: 500;
    }
    .brief-date {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }

    /* Company contact list */
    .contact-mini {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: #0f0f1e;
      border-radius: 8px;
      margin-bottom: 4px;
    }
    .contact-mini:last-child { margin-bottom: 0; }
    .contact-mini-avatar {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }
    .contact-mini-info { flex: 1; min-width: 0; }
    .contact-mini-name {
      font-size: 12px;
      font-weight: 500;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .contact-mini-role {
      font-size: 10px;
      color: #555;
    }
    .contact-mini-warmth {
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* Tab info */
    .tab-info {
      font-size: 10px;
      color: #444;
      padding: 8px 10px;
      background: #161625;
      border: 1px solid #1e1e35;
      border-radius: 8px;
      margin-bottom: 8px;
      word-break: break-all;
    }
    .tab-info strong {
      color: #777;
      display: block;
      margin-bottom: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Quick capture */
    .capture-section { margin-bottom: 8px; }
    .capture-section textarea {
      width: 100%;
      height: 40px;
      background: #161625;
      border: 1px solid #1e1e35;
      border-radius: 8px;
      color: #c8cfe0;
      font-size: 12px;
      font-family: inherit;
      padding: 8px 10px;
      resize: none;
      margin-bottom: 6px;
      box-sizing: border-box;
    }
    .capture-section textarea:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .actions {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .btn {
      flex: 1;
      padding: 7px;
      border: none;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary {
      background: #161625;
      color: #8892a8;
      border: 1px solid #1e1e35;
    }
    .btn-secondary:hover { background: #1e1e35; }
    .btn-capture { background: #16a34a; color: #fff; }
    .btn-capture:hover { background: #15803d; }
    .btn-add { background: #3b82f6; color: #fff; }
    .btn-add:hover { background: #2563eb; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .shortcut {
      font-size: 10px;
      color: #333;
      text-align: center;
      margin-bottom: 8px;
    }
    .shortcut kbd {
      background: #1e1e35;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: inherit;
      color: #555;
    }
    .toast {
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      text-align: center;
      margin-bottom: 8px;
      display: none;
    }
    .toast.success { display: block; background: rgba(74, 222, 128, 0.1); color: #4ade80; }
    .toast.error { display: block; background: rgba(239, 68, 68, 0.1); color: #ef4444; }
  </style>
</head>
<body>
  <h3>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
    </svg>
    Orca Browser Bridge
    <span class="version">v3</span>
  </h3>

  <div class="status-bar">
    <span class="status-dot disconnected" id="dot"></span>
    <span id="statusText">Checking...</span>
    <span id="statusSub"></span>
  </div>

  <div id="crmContainer"></div>

  <div class="tab-info" id="tabInfo" style="display:none">
    <strong id="tabTitle"></strong>
    <span id="tabUrl"></span>
  </div>

  <div class="capture-section">
    <textarea id="captureNotes" placeholder="Quick note about this page..."></textarea>
    <button class="btn btn-capture" id="captureBtn" style="width:100%">Save to Orca Memory</button>
  </div>

  <div class="shortcut">
    <kbd>Cmd+Shift+O</kbd> to capture from any page
  </div>

  <div id="toast" class="toast"></div>

  <div class="actions">
    <button class="btn btn-primary" id="reconnectBtn">Reconnect</button>
    <button class="btn btn-secondary" id="testBtn">Test</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
